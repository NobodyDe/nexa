<div class="flex w-full max-w-xl border-b border-gray-800 bg-black p-4">
  <div class="mr-3 shrink-0">
    <img
      [src]="user().profilePic"
      [alt]="'Foto de perfil de ' + user().name"
      class="h-10 w-10 rounded-full object-cover"
    />
  </div>

  <div class="flex w-full flex-col pt-1">
    <div class="mb-4">
      <input
        type="text"
        placeholder="What's happening?"
        [value]="postText()"
        (input)="onPostTextChange($event)"
        class="w-full bg-transparent text-[20px] text-white placeholder-[#71767b] outline-none"
      />
    </div>

    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4 text-[#71767b]">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
          ></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect
            x="2"
            y="6"
            width="20"
            height="12"
            rx="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></rect>
          <text
            x="12"
            y="15"
            text-anchor="middle"
            font-size="7"
            font-family="sans-serif"
            font-weight="bold"
            fill="currentColor"
            stroke-width="0"
          >
            GIF
          </text>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" stroke-linecap="round" stroke-linejoin="round"></circle>
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.5 5.5l13 13"></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8 6h12M8 12h12M8 18h12M4 6h.01M4 12h.01M4 18h.01"
          ></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          ></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
          ></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"
          ></path>
        </svg>
      </div>

      <button
        [disabled]="!postText()"
        [class]="
          postText()
            ? 'cursor-pointer rounded-full bg-[#EEEEEE] px-4 py-1.5 text-[15px] font-bold text-black'
            : 'cursor-default rounded-full bg-[#333639] px-4 py-1.5 text-[15px] font-bold text-[#71767b]'
        "
      >
        Post
      </button>
    </div>
  </div>
</div>
