<div
  class="w-full max-w-[598px] border-y border-[#2f3336] bg-black text-white px-4 pt-3 pb-1 hover:bg-[#080808] transition-colors cursor-pointer"
>
  <!-- Header -->
  <div class="flex gap-3">
    <!-- Avatar -->
    <div class="flex-shrink-0">
      <img
        [src]="profilePic()"
        [alt]="'Foto de perfil de ' + user()"
        class="h-10 w-10 rounded-full object-cover"
      />
    </div>
    <!-- Content -->
    <div class="flex-1 min-w-0">
      <!-- Top row: name, handle, time, icons -->
      <div class="flex items-start justify-between gap-2">
        <div class="flex flex-wrap items-center gap-x-1 min-w-0">
          <!-- Name -->
          <span class="font-bold text-[15px] leading-5 text-white truncate">{{ user() }}</span>
          <!-- Verified badge -->
          <svg
            class="w-[18px] h-[18px] text-blue-400 flex-shrink-0"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.66-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91C3.38 9.33 2.5 10.57 2.5 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.9.81 3.91s2.52 1.26 3.91.81c.66 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.33-2.19c1.4.46 2.91.2 3.92-.81s1.26-2.52.8-3.91C21.37 14.67 22.25 13.43 22.25 12zm-6.19-1.71l-3.6 4.8a.75.75 0 01-1.18.04L9.02 13a.75.75 0 011.18-.94l1.85 2.32 3.01-4.02a.75.75 0 011.2.9z"
            />
          </svg>
          <!-- Handle and time -->
          <span class="text-[#71767b] text-[15px] truncate">{{ username() }} · 2h</span>
        </div>
        <!-- Right icons -->
        <div class="flex items-center gap-1 flex-shrink-0 text-[#71767b]">
          <!-- Mute circle icon -->
          <button class="p-1.5 rounded-full hover:bg-[#1d1f23] hover:text-white transition-colors">
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="12" cy="12" r="9" />
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
            </svg>
          </button>
          <!-- More options -->
          <button class="p-1.5 rounded-full hover:bg-[#1d1f23] hover:text-white transition-colors">
            <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="2" />
              <circle cx="12" cy="12" r="2" />
              <circle cx="19" cy="12" r="2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Tweet text -->
      <div class="mt-2 text-[15px] leading-6 text-white whitespace-pre-line">
        NÃO VAI TER BRASIL E MARROCOS NOVA YORK ACABA HOJE
      </div>

      <!-- Action bar -->
      <div class="flex items-center justify-between mt-3 mb-1 text-[#71767b] max-w-[425px]">
        <!-- Reply -->
        <button class="flex items-center gap-2 group">
          <div
            class="p-2 rounded-full group-hover:bg-blue-500/10 group-hover:text-blue-400 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </div>
          <span class="text-[13px] group-hover:text-blue-400 transition-colors">13</span>
        </button>

        <!-- Retweet -->
        <button class="flex items-center gap-2 group">
          <div
            class="p-2 rounded-full group-hover:bg-green-500/10 group-hover:text-green-400 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <polyline points="17 1 21 5 17 9" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <polyline points="7 23 3 19 7 15" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </div>
          <span class="text-[13px] group-hover:text-green-400 transition-colors">60</span>
        </button>

        <!-- Like -->
        <button class="flex items-center gap-2 group">
          <div
            class="p-2 rounded-full group-hover:bg-pink-500/10 group-hover:text-pink-500 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
          </div>
          <span class="text-[13px] group-hover:text-pink-500 transition-colors">1,8K</span>
        </button>

        <!-- Views -->
        <button class="flex items-center gap-2 group">
          <div
            class="p-2 rounded-full group-hover:bg-blue-500/10 group-hover:text-blue-400 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </div>
          <span class="text-[13px] group-hover:text-blue-400 transition-colors">88K</span>
        </button>

        <!-- Bookmark + Share -->
        <div class="flex items-center">
          <button
            class="p-2 rounded-full hover:bg-blue-500/10 hover:text-blue-400 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
          </button>
          <button
            class="p-2 rounded-full hover:bg-blue-500/10 hover:text-blue-400 transition-colors"
          >
            <svg
              class="w-[18px] h-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="18" cy="5" r="3" />
              <circle cx="6" cy="12" r="3" />
              <circle cx="18" cy="19" r="3" />
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
