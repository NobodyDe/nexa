<div class="w-full flex flex-col justify-center">
  <h1 class="text-5xl mb-12 leading-[1.1] font-black">Acontecendo agora.</h1>

  <div class="flex flex-col gap-3">
    <button
      class="flex items-center justify-center gap-3 bg-white text-black rounded-full py-3 px-6 font-bold text-[15px] hover:bg-gray-100 transition-colors"
    >
      <svg lucidePhone class="w-5 h-5 text-black"></svg>
      Continuar com telefone
    </button>

    <button
      class="flex items-center justify-between bg-white text-black rounded-full py-2.5 px-4 hover:bg-gray-100 transition-colors"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-full bg-gray-500 flex items-center justify-center text-xs font-black text-white shrink-0"
        >
          H
        </div>
        <div class="text-left">
          <div class="text-[13px] font-bold leading-tight">Continue as Henrique</div>
          <div class="text-[11px] text-gray-500 leading-tight">henriquesantos.game@gmail.com</div>
        </div>
      </div>
      <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0 ml-3">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4"
        />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853"
        />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#FBBC05"
        />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335"
        />
      </svg>
    </button>

    <button
      class="flex items-center justify-center gap-3 bg-white text-black rounded-full py-3 px-6 font-bold text-[15px] hover:bg-gray-100 transition-colors"
    >
      <svg lucideApple class="w-5 h-5 text-black"></svg>
      Continuar com a Apple
    </button>
  </div>

  <div class="flex items-center my-5">
    <div class="flex-1 h-px bg-gray-800"></div>
    <span class="px-4 text-gray-500 text-sm">ou</span>
    <div class="flex-1 h-px bg-gray-800"></div>
  </div>

  <app-field
    placeholder="E-mail ou nome de utilizador"
    type="email"
    [value]="email()"
    (valueChange)="setEmail($event)"
    (focusChange)="onFocusChange($event)"
  />

  <app-continue-button label="Continuar" [isDisable]="!canContinue()" (clicked)="onContinue()" />

  <p class="text-[15px] text-white mb-2">
    <span class="text-gray-500">Não tem uma conta? </span>
    <button class="text-blue-400 hover:underline font-medium">Criar conta</button>
  </p>

  <p class="text-xs text-gray-600 leading-relaxed mt-4">
    Ao continuar, você concorda com nossos
    <a href="#" class="text-blue-500 hover:underline">Termos de Serviço</a>,
    <a href="#" class="text-blue-500 hover:underline">Política de Privacidade</a>
    e <a href="#" class="text-blue-500 hover:underline">Uso de cookies</a>.
  </p>
</div>
